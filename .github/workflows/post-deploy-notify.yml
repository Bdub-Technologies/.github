name: Post-Deploy Notify

on:
  workflow_call:
    inputs:
      service:
        description: 'Service name (e.g., bw-dating-chat)'
        required: true
        type: string
      version:
        description: 'Version being deployed (e.g., 1.2.3)'
        required: true
        type: string
      environment:
        description: 'Environment (dev or prod)'
        required: true
        type: string
      changelog:
        description: 'Changelog/release notes (optional)'
        required: false
        type: string
        default: ''
      jira_base_url:
        description: 'JIRA base URL'
        required: false
        type: string
        default: 'https://boilingwaters.atlassian.net'
      jira_project_key:
        description: 'JIRA project key'
        required: false
        type: string
        default: 'BDUB'
      slack_channel_id:
        description: 'Slack channel ID'
        required: true
        type: string
    secrets:
      JIRA_API_TOKEN:
        description: 'JIRA API token with permissions to manage releases'
        required: true
      JIRA_EMAIL:
        description: 'Email associated with JIRA API token'
        required: true
      SLACK_BOT_TOKEN:
        description: 'Slack bot token with permissions to post messages'
        required: true

permissions: {}

jobs:
  update-jira:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Get current month
        id: month
        run: echo "month=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Update JIRA Release
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_BASE_URL: ${{ inputs.jira_base_url }}
          JIRA_PROJECT_KEY: ${{ inputs.jira_project_key }}
        run: |
          set -euo pipefail
          RELEASE_NAME="${{ inputs.environment }} - ${{ steps.month.outputs.month }}"
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M')
          SERVICE="${{ inputs.service }}"
          VERSION="${{ inputs.version }}"

          echo "Looking for release: $RELEASE_NAME"

          # Get all versions for the project
          VERSIONS_RESPONSE=$(curl -fsS -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_BASE_URL/rest/api/3/project/$JIRA_PROJECT_KEY/versions")

          RELEASE_ID=$(echo "$VERSIONS_RESPONSE" | jq -r ".[] | select(.name == \"$RELEASE_NAME\") | .id")

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" == "null" ]; then
            echo "Release not found, creating new release: $RELEASE_NAME"

            # Get project ID first
            PROJECT_RESPONSE=$(curl -fsS -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL/rest/api/3/project/$JIRA_PROJECT_KEY")

            PROJECT_ID=$(echo "$PROJECT_RESPONSE" | jq -r '.id')

            CREATE_RESPONSE=$(curl -fsS -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL/rest/api/3/version" \
              -d "{
                \"name\": \"$RELEASE_NAME\",
                \"projectId\": $PROJECT_ID,
                \"description\": \"## Current Versions\\n\\n| Service | Version | Deployed |\\n|---------|---------|----------|\\n| $SERVICE | $VERSION | $TIMESTAMP |\"
              }")

            RELEASE_ID=$(echo "$CREATE_RESPONSE" | jq -r '.id')
            echo "Created release with ID: $RELEASE_ID"
          else
            echo "Found existing release with ID: $RELEASE_ID"

            # Get current description
            VERSION_RESPONSE=$(curl -fsS -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL/rest/api/3/version/$RELEASE_ID")

            CURRENT_DESC=$(echo "$VERSION_RESPONSE" | jq -r '.description // ""')

            if [ -z "$CURRENT_DESC" ]; then
              NEW_DESC=$(printf '%s\n\n| Service | Version | Deployed |\n|---------|---------|----------|\n| %s | %s | %s |' \
                "## Current Versions" \
                "$SERVICE" \
                "$VERSION" \
                "$TIMESTAMP")
            else
              # Update service row by exact service column match; append row if missing.
              NEW_DESC=$(printf '%s\n' "$CURRENT_DESC" | awk -F'|' -v svc="$SERVICE" -v ver="$VERSION" -v ts="$TIMESTAMP" '
                BEGIN { updated=0 }
                {
                  if ($0 ~ /^\|/) {
                    service=$2
                    gsub(/^[[:space:]]+|[[:space:]]+$/, "", service)
                    if (service == svc) {
                      print "| " svc " | " ver " | " ts " |"
                      updated=1
                      next
                    }
                  }
                  print
                }
                END {
                  if (!updated) {
                    print "| " svc " | " ver " | " ts " |"
                  }
                }')
            fi

            # Update release description
            curl -fsS -X PUT \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL/rest/api/3/version/$RELEASE_ID" \
              -d "{\"description\": $(echo "$NEW_DESC" | jq -Rs .)}"

            echo "Updated release description"
          fi

  notify-slack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: update-jira
    if: always()
    steps:
      - name: Extract JIRA ticket from changelog
        id: ticket
        env:
          CHANGELOG: ${{ inputs.changelog }}
        run: |
          set -euo pipefail
          TICKET=$(printf '%s\n' "$CHANGELOG" | grep -oE 'BDUB-[0-9]+' | head -1 || true)
          echo "ticket=$TICKET" >> $GITHUB_OUTPUT

      - name: Post to Slack (Success)
        if: needs.update-jira.result == 'success'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel-id: ${{ inputs.slack_channel_id }}
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *Deploy: ${{ inputs.service }}* v${{ inputs.version }} → *${{ inputs.environment }}*\n\nTicket: ${{ steps.ticket.outputs.ticket || 'N/A' }}"
                  }
                }
              ]
            }

      - name: Post to Slack (Failure)
        if: needs.update-jira.result != 'success'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel-id: ${{ inputs.slack_channel_id }}
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Deploy notify issue: ${{ inputs.service }}* v${{ inputs.version }} → *${{ inputs.environment }}*\n\nJIRA update job result: `${{ needs.update-jira.result }}`\nTicket: ${{ steps.ticket.outputs.ticket || 'N/A' }}"
                  }
                }
              ]
            }

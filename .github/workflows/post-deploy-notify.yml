name: Post-Deploy Notify

on:
  workflow_call:
    inputs:
      service:
        description: 'Service name (e.g., bw-dating-chat)'
        required: true
        type: string
      version:
        description: 'Version being deployed (e.g., 1.2.3)'
        required: true
        type: string
      environment:
        description: 'Environment (dev or prod)'
        required: true
        type: string
      changelog:
        description: 'Changelog/release notes (optional)'
        required: false
        type: string
        default: ''
      release_url:
        description: 'GitHub release URL (optional)'
        required: false
        type: string
        default: ''
      release_pr_url:
        description: 'GitHub release PR URL (optional)'
        required: false
        type: string
        default: ''
      jira_base_url:
        description: 'JIRA base URL'
        required: false
        type: string
        default: 'https://boilingwaters.atlassian.net'
      jira_project_key:
        description: 'JIRA project key'
        required: false
        type: string
        default: 'BDUB'
      slack_channel_id:
        description: 'Slack channel ID'
        required: true
        type: string
    secrets:
      JIRA_API_TOKEN:
        description: 'JIRA API token with permissions to manage releases'
        required: true
      JIRA_EMAIL:
        description: 'Email associated with JIRA API token'
        required: true
      SLACK_BOT_TOKEN:
        description: 'Slack bot token with permissions to post messages'
        required: true

permissions:
  contents: read
  pull-requests: read

jobs:
  update-jira:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Get current month
        id: month
        run: echo "month=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Update JIRA Release
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_BASE_URL: ${{ inputs.jira_base_url }}
          JIRA_PROJECT_KEY: ${{ inputs.jira_project_key }}
          CHANGELOG: ${{ inputs.changelog }}
          RELEASE_URL: ${{ inputs.release_url }}
          RELEASE_PR_URL: ${{ inputs.release_pr_url }}
        run: |
          set -euo pipefail
          RELEASE_NAME="${{ inputs.environment }} - ${{ steps.month.outputs.month }}"
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M')
          SERVICE="${{ inputs.service }}"
          VERSION="${{ inputs.version }}"
          API_BASE="/rest/api/3"
          SKIP_DESCRIPTION_UPDATE="false"

          jira_get() {
            local path="$1"
            local body
            local status
            body=$(mktemp)
            status=$(curl -sS -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Accept: application/json" \
              -o "$body" \
              -w "%{http_code}" \
              "$JIRA_BASE_URL$path")

            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              cat "$body"
              rm -f "$body"
              return 0
            fi

            echo "JIRA GET failed: $path (HTTP $status)" >&2
            head -c 500 "$body" >&2 || true
            echo >&2
            rm -f "$body"
            return 1
          }

          jira_extract_release_id() {
            local payload="$1"
            local release_name="$2"

            echo "$payload" | jq -r --arg name "$release_name" '
              def norm:
                tostring
                | gsub("^[[:space:]]+|[[:space:]]+$"; "")
                | ascii_downcase;

              first(
                (
                  if type == "array" then .[]
                  elif (type == "object" and has("values")) then .values[]
                  else empty
                  end
                )
                | select((.name | norm) == ($name | norm))
                | .id
              ) // empty
            '
          }

          jira_find_release_id() {
            local release_name="$1"
            local versions_response
            local release_id
            local page_response
            local start_at=0
            local max_results=100
            local is_last="false"
            local values_count

            versions_response=$(jira_get "$API_BASE/project/$JIRA_PROJECT_KEY/versions")
            release_id=$(jira_extract_release_id "$versions_response" "$release_name")
            if [ -n "$release_id" ]; then
              echo "$release_id"
              return 0
            fi

            while [ "$is_last" != "true" ]; do
              page_response=$(jira_get "$API_BASE/project/$JIRA_PROJECT_KEY/version?startAt=$start_at&maxResults=$max_results")
              release_id=$(jira_extract_release_id "$page_response" "$release_name")
              if [ -n "$release_id" ]; then
                echo "$release_id"
                return 0
              fi

              is_last=$(echo "$page_response" | jq -r '.isLast // "false"')
              values_count=$(echo "$page_response" | jq -r '(.values // []) | length')

              if [ "$values_count" = "0" ]; then
                break
              fi

              start_at=$((start_at + max_results))
            done

            echo ""
          }

          jira_add_fix_version_to_issue() {
            local issue_key="$1"
            local issue_response
            local has_fix_version
            local update_file
            local update_http

            issue_response=$(jira_get "$API_BASE/issue/$issue_key?fields=fixVersions")
            has_fix_version=$(echo "$issue_response" | jq -r --arg rid "$RELEASE_ID" '[.fields.fixVersions[]?.id == $rid] | any')

            if [ "$has_fix_version" = "true" ]; then
              echo "Issue already linked to release: $issue_key"
              return 0
            fi

            update_file=$(mktemp)
            update_http=$(curl -sS -w "%{http_code}" -o "$update_file" -X PUT \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL$API_BASE/issue/$issue_key" \
              -d "{\"update\":{\"fixVersions\":[{\"add\":{\"id\":\"$RELEASE_ID\"}}]}}")

            if [ "$update_http" = "204" ]; then
              echo "Linked issue to release: $issue_key"
            else
              echo "WARNING: Failed to link issue $issue_key to release (HTTP $update_http)" >&2
              echo "Response: $(cat "$update_file")" >&2
            fi

            rm -f "$update_file"
          }

          jira_clear_release_description() {
            local clear_file
            local clear_http

            clear_file=$(mktemp)
            clear_http=$(curl -sS -w "%{http_code}" -o "$clear_file" -X PUT \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL$API_BASE/version/$RELEASE_ID" \
              -d "{\"description\":\"\"}")

            if [ "$clear_http" = "200" ]; then
              echo "Cleared Jira release description"
            else
              echo "WARNING: Failed to clear Jira release description (HTTP $clear_http)" >&2
              echo "Response: $(cat "$clear_file")" >&2
            fi

            rm -f "$clear_file"
          }

          jira_add_related_work_link() {
            local title="$1"
            local url="$2"
            local related_response
            local exists
            local create_file
            local create_http

            if [ -z "$url" ]; then
              return 0
            fi

            if ! related_response=$(jira_get "$API_BASE/version/$RELEASE_ID/relatedwork"); then
              echo "WARNING: Unable to read Jira related work list" >&2
              return 0
            fi

            exists=$(echo "$related_response" | jq -r --arg u "$url" 'if type == "array" then any(.[]?; .url == $u) else false end')
            if [ "$exists" = "true" ]; then
              echo "Related work already exists: $url"
              return 0
            fi

            create_file=$(mktemp)
            create_http=$(curl -sS -w "%{http_code}" -o "$create_file" -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL$API_BASE/version/$RELEASE_ID/relatedwork" \
              -d "{\"category\":\"External Link\",\"title\":$(printf '%s' "$title" | jq -Rs .),\"url\":$(printf '%s' "$url" | jq -Rs .)}")

            if [ "$create_http" = "201" ] || [ "$create_http" = "200" ]; then
              echo "Added related work link: $title"
            else
              echo "WARNING: Failed to add related work link '$title' (HTTP $create_http)" >&2
              echo "Response: $(cat "$create_file")" >&2
            fi

            rm -f "$create_file"
          }

          github_api_get() {
            local path="$1"
            local body
            local status

            body=$(mktemp)
            status=$(curl -sS -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -o "$body" \
              -w "%{http_code}" \
              "https://api.github.com$path")

            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              cat "$body"
              rm -f "$body"
              return 0
            fi

            rm -f "$body"
            return 1
          }

          github_find_release_pr_url() {
            local tag_name="$1"
            local ref_response
            local object_sha
            local object_type
            local commit_sha
            local tag_object
            local pulls_response
            local pr_url

            if ! ref_response=$(github_api_get "/repos/$GITHUB_REPOSITORY/git/ref/tags/$tag_name"); then
              echo ""
              return 0
            fi

            object_sha=$(echo "$ref_response" | jq -r '.object.sha // empty')
            object_type=$(echo "$ref_response" | jq -r '.object.type // empty')
            commit_sha="$object_sha"

            if [ "$object_type" = "tag" ]; then
              if tag_object=$(github_api_get "/repos/$GITHUB_REPOSITORY/git/tags/$object_sha"); then
                commit_sha=$(echo "$tag_object" | jq -r '.object.sha // empty')
              fi
            fi

            if [ -z "$commit_sha" ]; then
              echo ""
              return 0
            fi

            if ! pulls_response=$(github_api_get "/repos/$GITHUB_REPOSITORY/commits/$commit_sha/pulls"); then
              echo ""
              return 0
            fi

            pr_url=$(echo "$pulls_response" | jq -r 'map(select(.merged_at != null)) | first | .html_url // empty')
            echo "$pr_url"
          }

          echo "Looking for release: $RELEASE_NAME"

          # Resolve project first; fallback to v2 API if needed.
          if ! PROJECT_RESPONSE=$(jira_get "$API_BASE/project/$JIRA_PROJECT_KEY"); then
            echo "Retrying JIRA project lookup with v2 API..." >&2
            API_BASE="/rest/api/2"
            PROJECT_RESPONSE=$(jira_get "$API_BASE/project/$JIRA_PROJECT_KEY")
          fi

          PROJECT_ID=$(echo "$PROJECT_RESPONSE" | jq -r '.id // empty')
          if [ -z "$PROJECT_ID" ]; then
            echo "Unable to resolve JIRA project id for key: $JIRA_PROJECT_KEY" >&2
            exit 1
          fi

          RELEASE_ID=$(jira_find_release_id "$RELEASE_NAME")

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" == "null" ]; then
            echo "Release not found, creating new release: $RELEASE_NAME"
            echo "DEBUG: projectId=$PROJECT_ID, service=$SERVICE, version=$VERSION"

            RESPONSE_FILE=$(mktemp)
            HTTP_CODE=$(curl -sS -w "%{http_code}" -o "$RESPONSE_FILE" -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL$API_BASE/version" \
              -d "{
                \"name\": \"$RELEASE_NAME\",
                \"projectId\": $PROJECT_ID
              }")

            echo "DEBUG: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "201" ]; then
              CREATE_RESPONSE=$(cat "$RESPONSE_FILE")

              if [ "$HTTP_CODE" = "400" ] && echo "$CREATE_RESPONSE" | jq -e '.errors.name? | test("already exists"; "i")' >/dev/null; then
                RELEASE_ID=$(jira_find_release_id "$RELEASE_NAME")
                if [ -n "$RELEASE_ID" ]; then
                  echo "Release already exists, using existing release ID: $RELEASE_ID"
                  rm -f "$RESPONSE_FILE"
                else
                  echo "WARNING: Release already exists but could not be located: $RELEASE_NAME" >&2
                  echo "Response: $CREATE_RESPONSE" >&2
                  echo "Skipping JIRA release description update for this run." >&2
                  SKIP_DESCRIPTION_UPDATE="true"
                  rm -f "$RESPONSE_FILE"
                fi
              else
                echo "ERROR: Failed to create JIRA release (HTTP $HTTP_CODE)"
                echo "Response: $CREATE_RESPONSE"
                rm -f "$RESPONSE_FILE"
                exit 1
              fi
            else
              CREATE_RESPONSE=$(cat "$RESPONSE_FILE")
              RELEASE_ID=$(echo "$CREATE_RESPONSE" | jq -r '.id')
              echo "Created release with ID: $RELEASE_ID"
              rm -f "$RESPONSE_FILE"
            fi
          elif [ "$SKIP_DESCRIPTION_UPDATE" != "true" ]; then
            echo "Found existing release with ID: $RELEASE_ID"
          else
            echo "Skipping JIRA release update because existing release ID could not be resolved."
          fi

          if [ -n "${RELEASE_ID:-}" ] && [ "$RELEASE_ID" != "null" ]; then
            jira_clear_release_description

            if [ -z "${RELEASE_PR_URL:-}" ]; then
              RELEASE_PR_URL=$(github_find_release_pr_url "v${VERSION}")
            fi

            jira_add_related_work_link "Release PR: ${SERVICE} v${VERSION}" "${RELEASE_PR_URL:-}"
            jira_add_related_work_link "Release: ${SERVICE} v${VERSION}" "${RELEASE_URL:-}"
          fi

          if [ -n "${CHANGELOG:-}" ]; then
            ISSUE_KEYS=$(printf '%s\n' "$CHANGELOG" | grep -oE "${JIRA_PROJECT_KEY}-[0-9]+" || true)
            ISSUE_KEYS=$(printf '%s\n' "$ISSUE_KEYS" | sed '/^$/d' | sort -u | tr '\n' ' ')
            if [ -n "$ISSUE_KEYS" ]; then
              if [ -z "${RELEASE_ID:-}" ] || [ "$RELEASE_ID" = "null" ]; then
                echo "WARNING: Cannot link issues because release ID is unavailable." >&2
              else
                echo "Linking issues to release $RELEASE_ID: $ISSUE_KEYS"
                for ISSUE_KEY in $ISSUE_KEYS; do
                  jira_add_fix_version_to_issue "$ISSUE_KEY"
                done
              fi
            else
              echo "No JIRA issue keys found in changelog"
            fi
          else
            echo "No changelog provided; skipping issue-to-release linking"
          fi

  notify-slack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: update-jira
    if: always()
    steps:
      - name: Extract JIRA ticket from changelog
        id: ticket
        env:
          CHANGELOG: ${{ inputs.changelog }}
        run: |
          set -euo pipefail
          TICKET=$(printf '%s\n' "$CHANGELOG" | grep -oE 'BDUB-[0-9]+' | head -1 || true)
          echo "ticket=$TICKET" >> $GITHUB_OUTPUT

      - name: Post to Slack (Success)
        if: needs.update-jira.result == 'success'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ inputs.slack_channel_id }}
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *Deploy: ${{ inputs.service }}* v${{ inputs.version }} → *${{ inputs.environment }}*\n\nTicket: ${{ steps.ticket.outputs.ticket || 'N/A' }}"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Post to Slack (Failure)
        if: needs.update-jira.result != 'success'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ inputs.slack_channel_id }}
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Deploy notify issue: ${{ inputs.service }}* v${{ inputs.version }} → *${{ inputs.environment }}*\n\nJIRA update job result: `${{ needs.update-jira.result }}`\nTicket: ${{ steps.ticket.outputs.ticket || 'N/A' }}"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
